services:
  web:
    build: .
    ports:
      - 8000:8000
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - "postgres"
      - "redis"

  postgres:
    image: postgres
    ports:
      - 7000:5432
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis
    ports:
      - 7001:6379
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: