services:
  web:
    build: .
    ports:
      - 8000:8000
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - "postgres"

  postgres:
    image: postgres
    ports:
      - 7000:5432
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data: